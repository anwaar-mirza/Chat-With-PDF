<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatWithPDF</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --surface-raised: #202026;
      --border: #2e2e38;
      --accent: #e8c547;
      --accent-dim: rgba(232, 197, 71, 0.12);
      --accent-glow: rgba(232, 197, 71, 0.25);
      --text-primary: #f0efe8;
      --text-secondary: #8a8a96;
      --text-muted: #52525e;
      --user-bubble: #e8c547;
      --user-text: #0e0e10;
      --bot-bubble: #202026;
      --bot-text: #f0efe8;
      --danger: #e05c5c;
      --success: #5ce07a;
      --radius: 14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 18px; height: 18px; }

    .logo-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .logo-title span {
      color: var(--accent);
    }

    .divider {
      height: 1px;
      background: var(--border);
    }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: transparent;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 12px;
      background: var(--surface-raised);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upload-icon svg { width: 20px; height: 20px; color: var(--accent); }

    .upload-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .upload-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    .upload-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: var(--user-text);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .upload-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .upload-btn:active { transform: translateY(0); }
    .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Status indicator */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface-raised);
      border-radius: var(--radius-sm);
      font-size: 12px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.loading {
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .status-text { color: var(--text-secondary); font-family: 'DM Mono', monospace; }

    .file-badge {
      margin-top: auto;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-glow);
      border-radius: var(--radius-sm);
    }

    .file-badge.show { display: flex; }

    .file-badge-icon { color: var(--accent); flex-shrink: 0; }
    .file-badge-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* === MAIN CHAT === */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .topbar {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .topbar-title {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--text-primary);
    }

    .topbar-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      font-family: 'DM Mono', monospace;
    }

    .clear-btn {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0.5;
      text-align: center;
      padding: 40px;
    }

    .empty-state svg { width: 52px; height: 52px; color: var(--text-muted); }
    .empty-state h3 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text-secondary); }
    .empty-state p { font-size: 13px; color: var(--text-muted); max-width: 280px; line-height: 1.6; }

    /* Messages */
    .message-row {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.25s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 600;
      align-self: flex-end;
    }

    .avatar.bot { background: var(--surface-raised); border: 1px solid var(--border); }
    .avatar.user { background: var(--accent); color: var(--user-text); }

    .bubble {
      max-width: 68%;
      padding: 13px 17px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      position: relative;
    }

    .bubble.bot {
      background: var(--bot-bubble);
      color: var(--bot-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: var(--user-bubble);
      color: var(--user-text);
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }

    .bubble-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 5px;
      font-family: 'DM Mono', monospace;
    }

    .message-row.user .bubble-time { text-align: right; }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 20px 28px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-box {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within { border-color: var(--accent); }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
      padding: 2px 0;
    }

    #userInput::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .send-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; color: var(--user-text); }

    .input-hint {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      font-family: 'DM Mono', monospace;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      z-index: 10000;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #1a2e1e; border: 1px solid var(--success); color: var(--success); }
    .toast.error { background: #2e1a1a; border: 1px solid var(--danger); color: var(--danger); }

    /* Responsive */
    @media (max-width: 640px) {
      .sidebar { width: 100%; min-width: unset; height: auto; flex-direction: row; flex-wrap: wrap; padding: 16px; gap: 12px; border-right: none; border-bottom: 1px solid var(--border); }
      body { flex-direction: column; }
      .main { flex: 1; }
      .file-badge { margin-top: 0; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <span class="logo-title">Chat<span>PDF</span></span>
    </div>

    <div class="divider"></div>

    <div>
      <div class="upload-zone" id="dropZone">
        <input type="file" id="pdfInput" accept="application/pdf" onchange="handleFileSelect(event)" />
        <div class="upload-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </div>
        <div class="upload-label">Drop your PDF here</div>
        <div class="upload-hint">or click to browse files</div>
      </div>
      <button class="upload-btn" id="uploadBtn" onclick="uploadPDF()" disabled>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        Upload & Process
      </button>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">No PDF loaded</span>
    </div>

    <div class="file-badge" id="fileBadge">
      <svg class="file-badge-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="file-badge-name" id="fileNameDisplay">—</span>
    </div>
  </aside>

  <!-- Main chat -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Conversation</div>
        <div class="topbar-sub" id="sessionLabel">session · none</div>
      </div>
      <button class="clear-btn" onclick="clearChat()">Clear chat</button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <h3>Ask your document</h3>
        <p>Upload a PDF on the left, then ask questions to start a conversation.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="userInput" rows="1" placeholder="Ask something about your PDF…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://localhost:8000';
    let sessionId = null;
    let selectedFile = null;

    // --- Drag & drop ---
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        selectedFile = file;
        updateFileUI(file.name);
      } else showToast('Please drop a PDF file.', 'error');
    });

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) { selectedFile = file; updateFileUI(file.name); }
    }

    function updateFileUI(name) {
      document.getElementById('uploadBtn').disabled = false;
      document.querySelector('.upload-label').textContent = name;
      document.querySelector('.upload-hint').textContent = 'Click "Upload & Process" to continue';
    }

    // --- Upload PDF ---
    async function uploadPDF() {
      if (!selectedFile) return;
      const btn = document.getElementById('uploadBtn');
      btn.disabled = true;
      btn.textContent = 'Processing…';
      setStatus('loading', 'Uploading PDF…');

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch(`${API}/upload`, { method: 'POST', body: formData });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();

        sessionId = data.session_id;
        setStatus('active', 'Ready to chat');

        // Update UI
        const short = sessionId.slice(0, 8) + '…';
        document.getElementById('sessionLabel').textContent = `session · ${short}`;
        document.getElementById('fileNameDisplay').textContent = selectedFile.name;
        document.getElementById('fileBadge').classList.add('show');

        document.getElementById('sendBtn').disabled = false;
        document.getElementById('userInput').disabled = false;
        document.getElementById('userInput').focus();

        btn.textContent = '✓ Loaded';
        showToast('PDF processed successfully!', 'success');
        addSystemMessage(`📄 <strong>${selectedFile.name}</strong> is ready. Ask me anything about it.`);

      } catch (err) {
        setStatus('', 'Upload failed');
        btn.disabled = false;
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          Upload & Process`;
        showToast('Upload failed. Is the backend running?', 'error');
        console.error(err);
      }
    }

    // --- Send message ---
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text || !sessionId) return;

      addMessage(text, 'user');
      input.value = '';
      input.style.height = 'auto';

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;

      const typingId = addTypingIndicator();

      try {
        const res = await fetch(`${API}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, message: text })
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        removeTypingIndicator(typingId);
        addMessage(data.reply || 'No response.', 'bot');

      } catch (err) {
        removeTypingIndicator(typingId);
        addMessage('⚠️ Could not reach the backend. Make sure it\'s running at localhost:8000.', 'bot');
        console.error(err);
      }

      sendBtn.disabled = false;
      input.focus();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // --- Message helpers ---
    function addMessage(text, sender) {
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      const row = document.createElement('div');
      row.classList.add('message-row', sender);

      const avatarEl = document.createElement('div');
      avatarEl.classList.add('avatar', sender);
      avatarEl.textContent = sender === 'user' ? 'U' : '✦';

      const wrap = document.createElement('div');

      const bubble = document.createElement('div');
      bubble.classList.add('bubble', sender);
      bubble.innerHTML = text;

      const time = document.createElement('div');
      time.classList.add('bubble-time');
      time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      wrap.appendChild(bubble);
      wrap.appendChild(time);
      row.appendChild(avatarEl);
      row.appendChild(wrap);

      document.getElementById('chatArea').appendChild(row);
      scrollToBottom();
      return row;
    }

    function addSystemMessage(html) {
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      const row = document.createElement('div');
      row.style.cssText = 'text-align:center;font-size:12px;color:var(--text-muted);padding:4px 0;font-family:DM Mono,monospace;animation:fadeUp 0.3s ease;';
      row.innerHTML = html;
      document.getElementById('chatArea').appendChild(row);
      scrollToBottom();
    }

    function addTypingIndicator() {
      const id = 'typing-' + Date.now();
      const row = document.createElement('div');
      row.classList.add('message-row', 'bot');
      row.id = id;

      const avatarEl = document.createElement('div');
      avatarEl.classList.add('avatar', 'bot');
      avatarEl.textContent = '✦';

      const bubble = document.createElement('div');
      bubble.classList.add('bubble', 'bot', 'typing-bubble');
      bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      row.appendChild(avatarEl);
      row.appendChild(bubble);
      document.getElementById('chatArea').appendChild(row);
      scrollToBottom();
      return id;
    }

    function removeTypingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function scrollToBottom() {
      const chat = document.getElementById('chatArea');
      chat.scrollTop = chat.scrollHeight;
    }

    function clearChat() {
      const chat = document.getElementById('chatArea');
      chat.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.id = 'emptyState';
      empty.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <h3>Ask your document</h3>
        <p>Upload a PDF on the left, then ask questions to start a conversation.</p>`;
      chat.appendChild(empty);
    }

    // --- Status helpers ---
    function setStatus(type, text) {
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot' + (type ? ' ' + type : '');
      document.getElementById('statusText').textContent = text;
    }

    // --- Toast ---
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = `toast ${type}`, 2800);
    }

    // Disable textarea until session is active
    document.getElementById('userInput').disabled = true;
  </script>
</body>
</html>
